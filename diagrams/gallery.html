    <div class="diagram"><pre class="mermaid">%%{init: {&#x27;theme&#x27;:&#x27;dark&#x27;, &#x27;themeVariables&#x27;: { 
    &#x27;fontSize&#x27;: &#x27;20px&#x27;, 
    &#x27;primaryTextColor&#x27;: &#x27;#fff&#x27;,

    &#x27;secondaryColor&#x27;: &#x27;#FFA630&#x27;, 
    &#x27;tertiaryColor&#x27;: &#x27;#28A745&#x27;, 
    &#x27;textColor&#x27;: &#x27;#CCCCCC&#x27;,
    &#x27;background&#x27;: &#x27;#282a36&#x27;
}}}%%
sequenceDiagram
    %% 1. Visual Identifiers with Icons
    participant User as 👤 User
    participant Kubectl as 🔧 kubectl
    participant API_Server as 🎮 API Server
    participant Etcd as 💾 etcd
    participant Scheduler as 🧩 Scheduler
    participant Kubelet as 🤖 Kubelet
    participant Container_Runtime as 🐳 Container Runtime
    
    %% No custom styling for better compatibility
    
    %% 3. Add Technical Depth with Process Phases
    rect rgb(20,30,40)
    note over User,Container_Runtime: &lt;b&gt;Kubernetes Application Deployment Flow&lt;/b&gt;
    
    %% Phase 1: User Authentication and Validation
    Note over User,Kubectl: &lt;b&gt;Phase 1: User Authentication &amp; Validation&lt;/b&gt;
    User-&gt;&gt;Kubectl: kubectl apply -f &lt;manifest.yaml&gt;
    Kubectl-&gt;&gt;API_Server: Authenticate &amp; Submit manifest
    API_Server-&gt;&gt;Etcd: Validate manifest &amp; resource version
    Etcd--&gt;&gt;API_Server: Confirm no conflicts &amp; store desired state
    API_Server--&gt;&gt;Kubectl: Confirm receipt (202 Accepted)
    Kubectl--&gt;&gt;User: &quot;deployment.apps/example created&quot;
    
    %% Phase 2: Control Plane Processing
    Note over API_Server,Scheduler: &lt;b&gt;Phase 2: Control Plane Processing&lt;/b&gt;
    API_Server-&gt;&gt;Scheduler: Notify of unscheduled pod(s)
    Scheduler-&gt;&gt;Scheduler: Evaluate node capacity, taints, affinity
    Scheduler-&gt;&gt;API_Server: Node selection &amp; binding decision
    API_Server-&gt;&gt;Etcd: Update pod spec with node assignment
    
    %% Phase 3: Node Operations
    Note over Kubelet,Container_Runtime: &lt;b&gt;Phase 3: Node Operations&lt;/b&gt;
    API_Server-&gt;&gt;Kubelet: Assign pod to node (via watch)
    Kubelet-&gt;&gt;Kubelet: Validate pod security context
    Kubelet-&gt;&gt;Container_Runtime: Pull image(s) with auth
    
    alt Image Pull Successful
        Container_Runtime--&gt;&gt;Kubelet: Image(s) pulled successfully
        Kubelet-&gt;&gt;Container_Runtime: Start container(s)
        Kubelet-&gt;&gt;Kubelet: Configure pod networking &amp; volumes
        Container_Runtime--&gt;&gt;Kubelet: Container(s) running
        Kubelet--&gt;&gt;API_Server: Update pod status to Running
    else Image Pull Failure
        Container_Runtime--&gt;&gt;Kubelet: Image pull failed (401/404)
        Kubelet--&gt;&gt;API_Server: Log error, apply backoff, retry
    end
    
    %% Phase 4: Readiness &amp; Availability
    Note over API_Server: &lt;b&gt;Phase 4: Readiness &amp; Availability&lt;/b&gt;
    API_Server--&gt;&gt;User: Deployment status (kubectl get pods)
    
    %% Optional: Readiness Probes
    opt Readiness Checks
        Kubelet-&gt;&gt;Container_Runtime: Execute readiness probe
        Container_Runtime--&gt;&gt;Kubelet: Container is ready
        Kubelet--&gt;&gt;API_Server: Update pod ready condition
    end
    end
</pre></div>

    rect rgb(20,30,40)
    note over User,Container_Runtime: &lt;b&gt;Kubernetes Application Deployment Flow&lt;/b&gt;
    
    %% Phase 1: User Authentication and Validation
    Note over User,Kubectl: &lt;b&gt;Phase 1: User Authentication &amp; Validation&lt;/b&gt;
    User-&gt;&gt;Kubectl: kubectl apply -f &lt;manifest.yaml&gt;
    Kubectl-&gt;&gt;API_Server: Authenticate &amp; Submit manifest
    API_Server-&gt;&gt;Etcd: Validate manifest &amp; resource version
    Etcd--&gt;&gt;API_Server: Confirm no conflicts &amp; store desired state
    API_Server--&gt;&gt;Kubectl: Confirm receipt (202 Accepted)
    Kubectl--&gt;&gt;User: &quot;deployment.apps/example created&quot;
    
    %% Phase 2: Control Plane Processing
    Note over API_Server,Scheduler: &lt;b&gt;Phase 2: Control Plane Processing&lt;/b&gt;
    API_Server-&gt;&gt;Scheduler: Notify of unscheduled pod(s)
    Scheduler-&gt;&gt;Scheduler: Evaluate node capacity, taints, affinity
    Scheduler-&gt;&gt;API_Server: Node selection &amp; binding decision
    API_Server-&gt;&gt;Etcd: Update pod spec with node assignment
    
    %% Phase 3: Node Operations
    Note over Kubelet,Container_Runtime: &lt;b&gt;Phase 3: Node Operations&lt;/b&gt;
    API_Server-&gt;&gt;Kubelet: Assign pod to node (via watch)
    Kubelet-&gt;&gt;Kubelet: Validate pod security context
    Kubelet-&gt;&gt;Container_Runtime: Pull image(s) with auth
    
    alt Image Pull Successful
        Container_Runtime--&gt;&gt;Kubelet: Image(s) pulled successfully
        Kubelet-&gt;&gt;Container_Runtime: Start container(s)
        Kubelet-&gt;&gt;Kubelet: Configure pod networking &amp; volumes
        Container_Runtime--&gt;&gt;Kubelet: Container(s) running
        Kubelet--&gt;&gt;API_Server: Update pod status to Running
    else Image Pull Failure
        Container_Runtime--&gt;&gt;Kubelet: Image pull failed (401/404)
        Kubelet--&gt;&gt;API_Server: Log error, apply backoff, retry
    end
    
    %% Phase 4: Readiness &amp; Availability
    Note over API_Server: &lt;b&gt;Phase 4: Readiness &amp; Availability&lt;/b&gt;
    API_Server--&gt;&gt;User: Deployment status (kubectl get pods)
    
    %% Optional: Readiness Probes
    opt Readiness Checks
        Kubelet-&gt;&gt;Container_Runtime: Execute readiness probe
        Container_Runtime--&gt;&gt;Kubelet: Container is ready
        Kubelet--&gt;&gt;API_Server: Update pod ready condition
    end
    end
</pre></details>

flowchart TB
    %% Main title
    title[&quot;Kubernetes RBAC: Authorization Flow and Decision Process&quot;]
    
    %% Request entry point
    request[&quot;API Request
    User: john@example.com
    Verb: list
    Resource: pods
    Namespace: production&quot;]
    
    %% Kubernetes API Server
    subgraph API_SERVER[&quot;API Server&quot;]
        direction TB
        
        subgraph AUTHENTICATION[&quot;Authentication&quot;]
            direction TB
            
            auth_modules[&quot;Authentication Modules:
            - X.509 Client Certs
            - Bearer Tokens
            - OpenID Connect
            - Webhook Token Auth&quot;]

            - Username: john@example.com
            - UID: john-123
            - Groups: dev-team, operations&quot;]
        end
        
        subgraph AUTHORIZATION[&quot;Authorization&quot;]
            direction TB
            
            auth_modules2[&quot;Authorization Modules:
            - Node
            - ABAC
            - RBAC (Focus)
            - Webhook&quot;]
            
            rbac_check[&quot;RBAC Check:
            1. Find all RoleBindings and ClusterRoleBindings
               that reference the user/groups
            2. Collect all referenced Roles and ClusterRoles
            3. Check if any role permits the requested action&quot;]
            
            decision[&quot;Decision:
            - Allowed or Denied
            - Caching for performance&quot;]
        end
        
        subgraph ADMISSION[&quot;Admission Control&quot;]

            admission_modules[&quot;Admission Webhooks

        end

    end
    
    %% RBAC rules storage
    subgraph RBAC_RULES[&quot;RBAC Rules in etcd&quot;]
        direction TB
        
        subgraph ROLES_DB[&quot;Roles&quot;]

            namespace: production
            resources: pods
            verbs: get, list, watch&quot;]
            
            role2[&quot;Role: pod-editor
            namespace: production
            resources: pods
            verbs: create, update, patch, delete&quot;]
        end

            cr1[&quot;ClusterRole: view
            resources: many, incl. pods
            verbs: get, list, watch&quot;]
            
            cr2[&quot;ClusterRole: edit
            resources: many, incl. pods
            verbs: get, list, watch, create, update,
            patch, delete&quot;]
            
            cr3[&quot;ClusterRole: cluster-admin
            resources: *
            verbs: *&quot;]
        end

            namespace: production
            subjects:

            roleRef: pod-viewer&quot;]
            
            rb2[&quot;RoleBinding: ops-pod-editors
            namespace: production
            subjects: 
              - group: operations
            roleRef: pod-editor&quot;]
            
            crb1[&quot;ClusterRoleBinding: john-view
            subjects:
              - user: john@example.com
            roleRef: view&quot;]
        end

    %% Detailed authorization process
    subgraph AUTH_PROCESS[&quot;Authorization Process Details&quot;]
        direction TB
        
        step1[&quot;1. Identify Subject:
        - Username: john@example.com
        - Groups: dev-team, operations&quot;]
        
        step2[&quot;2. Find applicable bindings:
        - RoleBinding: dev-pod-viewers (via dev-team group)

        - ClusterRoleBinding: john-view (via username)&quot;]

        - Role: pod-editor (from ops-pod-editors)
        - ClusterRole: view (from john-view)&quot;]

        Check if any role allows:
        - Verb: list
        - Resource: pods

sequenceDiagram
    %% === LINUX BOOT PROCESS DIAGRAM ===
    %% Title: Linux Boot Sequence
    %% Description: Detailed flow of Linux system startup from power-on to user login

    %% Component Definitions with Icons
    participant Power as 🔌 Power On
    participant BIOS as 🔧 BIOS/UEFI
    participant Disk as 💽 Boot Device
    participant Bootloader as 🥾 GRUB/LILO
    participant Kernel as 🐧 Linux Kernel
    participant Init as ⚙️ Init/Systemd
    participant Services as 🔄 Services
    participant Display as 🖥️ Display Manager

    %% No custom styling for better compatibility
    
    %% Phase 1: Hardware Initialization
    rect rgb(40,20,15)
    note over Power,Display: &lt;b&gt;Phase 1: Hardware Initialization&lt;/b&gt;
    
    Power-&gt;&gt;+BIOS: System power activated
    note right of Power: POST begins
    
    BIOS--&gt;&gt;BIOS: Power-On Self Test (POST)
    BIOS--&gt;&gt;BIOS: Initialize core hardware
    BIOS-&gt;&gt;-Disk: Locate boot device
    
    note left of BIOS: Check boot sequence&lt;br/&gt;in CMOS settings
    end

    %% Phase 2: Bootloader Stage
    rect rgb(40,30,15)
    note over Power,Display: &lt;b&gt;Phase 2: Bootloader Stage&lt;/b&gt;
    
    Disk-&gt;&gt;+Bootloader: Load bootloader from MBR/GPT
    
    alt UEFI System
        note over Bootloader: Load from EFI System Partition
    else Legacy BIOS
        note over Bootloader: Load from Master Boot Record
    end
    
    Bootloader--&gt;&gt;Bootloader: Display boot menu
    Bootloader--&gt;&gt;Bootloader: Load boot parameters
    Bootloader-&gt;&gt;-Kernel: Load kernel &amp; initramfs
    
    note right of Bootloader: Pass kernel parameters&lt;br/&gt;like root device location
    end
    
    %% Phase 3: Kernel Initialization
    rect rgb(15,40,15)
    note over Power,Display: &lt;b&gt;Phase 3: Kernel Initialization&lt;/b&gt;
    
    Kernel--&gt;&gt;Kernel: Decompress itself
    Kernel--&gt;&gt;Kernel: Initialize memory management
    Kernel--&gt;&gt;Kernel: Mount root filesystem (read-only)
    Kernel--&gt;&gt;Kernel: Load essential drivers
    
    alt Using initramfs/initrd
        Kernel--&gt;&gt;Kernel: Load drivers needed to&lt;br/&gt;mount actual root filesystem
        Kernel--&gt;&gt;Kernel: Switch to actual root filesystem
    end
    
    Kernel-&gt;&gt;+Init: Start first process (PID 1)
    end
    
    %% Phase 4: System Initialization
    rect rgb(15,25,40)
    note over Power,Display: &lt;b&gt;Phase 4: System Initialization&lt;/b&gt;
    
    alt SystemD Init System
        Init--&gt;&gt;Init: Parse /etc/systemd/system
        Init-&gt;&gt;+Services: Start target units in dependency order
    else SysVinit
        Init--&gt;&gt;Init: Parse /etc/inittab
        Init-&gt;&gt;+Services: Execute runlevel scripts in /etc/rc.d/
    end
    
    Services--&gt;&gt;Services: Start system services
    Services--&gt;&gt;Services: Configure network
    Services--&gt;&gt;Services: Mount filesystems
    Services-&gt;&gt;-Init: Core services started
    
    Init-&gt;&gt;+Display: Start display manager
    end
    
    %% Phase 5: User Session
    rect rgb(30,15,40)
    note over Power,Display: &lt;b&gt;Phase 5: User Session&lt;/b&gt;
    
    Display--&gt;&gt;Display: Show login screen
    Display-&gt;&gt;Display: Authenticate user
    Display-&gt;&gt;-Init: Start user session
    
    note right of Display: Launch desktop environment&lt;br/&gt;or shell based on user profile
    end
</pre></div>

sequenceDiagram
    %% === TLS/SSL HANDSHAKE DIAGRAM ===
    %% Title: TLS/SSL Handshake and Secure Communication
    %% Description: Shows the TLS 1.2 handshake process and subsequent encrypted communication

    %% Component Definitions
    participant Client as 💻 Client
    participant Server as 🖥️ Server
    
    %% No custom styling for better compatibility
    
    %% Handshake Phase
    rect rgb(15,25,40)
    note over Client,Server: &lt;b&gt;Phase 1: Handshake&lt;/b&gt;

    %% Initial Hello Messages
    Client-&gt;&gt;Server: ClientHello&lt;br/&gt;(TLS versions, cipher suites, random)
    note right of Client: Supports TLS 1.0-1.3&lt;br/&gt;Offers modern ciphers
    Server-&gt;&gt;Client: ServerHello&lt;br/&gt;(Selected TLS version, cipher suite, random)
    note left of Server: Selects highest&lt;br/&gt;supported version

    %% Certificate Exchange
    Server-&gt;&gt;Client: Certificate&lt;br/&gt;(Server&#x27;s X.509 certificate chain)
    note left of Server: Contains public key&lt;br/&gt;and digital signature
    
    %% Key Exchange
    alt ECDHE/DHE Key Exchange (Forward Secrecy)
        Server-&gt;&gt;Client: ServerKeyExchange&lt;br/&gt;(DH/ECDH parameters signed by server)
        note left of Server: Enables perfect&lt;br/&gt;forward secrecy
    else RSA Key Exchange
        note over Client,Server: No ServerKeyExchange&lt;br/&gt;(Using RSA direct encryption)
    end
    
    Server-&gt;&gt;Client: ServerHelloDone
    
    %% Client Response
    Client-&gt;&gt;Server: ClientKeyExchange&lt;br/&gt;(Pre-master secret)
    note right of Client: Key material protected&lt;br/&gt;by server&#x27;s public key&lt;br/&gt;or ECDHE/DHE
    
    %% Switch to Encrypted Communication
    Client-&gt;&gt;Server: ChangeCipherSpec
    Client-&gt;&gt;Server: Finished (Encrypted with session keys)
    Server-&gt;&gt;Client: ChangeCipherSpec
    Server-&gt;&gt;Client: Finished (Encrypted with session keys)
    
    note over Client,Server: &lt;b&gt;Session Keys Established&lt;/b&gt;
    end
    
    %% Encrypted Communication Phase
    rect rgb(15,40,15)
    note over Client,Server: &lt;b&gt;Phase 2: Encrypted Communication&lt;/b&gt;
    
    Client-&gt;&gt;Server: Encrypted Application Data
    Server-&gt;&gt;Client: Encrypted Application Data
    
    opt Session Resumption
        note over Client,Server: For future connections:&lt;br/&gt;TLS Session ID or Tickets&lt;br/&gt;enable faster reconnection
    end
    end
    
    %% TLS 1.3 Handshake (Optional)
    note over Client,Server: &lt;b&gt;TLS 1.3 Handshake (Improved)&lt;/b&gt;
    note over Client,Server: TLS 1.3 reduces handshake to 1-RTT&lt;br/&gt;by combining ClientHello and key share&lt;br/&gt;and requires perfect forward secrecy
</pre></div>

    %% === AWS SIMPLE WEB APPLICATION ARCHITECTURE ===
    %% Title: AWS-Based Web Application Architecture
    %% Description: Basic three-tier web application architecture in AWS VPC

    %% External User Connection
    User([&quot;👤 Internet Users&quot;]) -- &quot;HTTPS (443)&quot; --&gt; CloudFront[&quot;📡 CloudFront CDN&quot;]
    CloudFront -- &quot;Origin Requests&quot; --&gt; WAF
    
    %% VPC Architecture
    subgraph VPC [&quot;☁️ Virtual Private Cloud&quot;]
        direction TB
        
        %% Public Tier
        subgraph PublicSubnets [&quot;🌐 Public Subnets&quot;]
            direction LR
            WAF[&quot;🛡️ WAF&quot;]
            LB[&quot;⚖️ Load Balancer&quot;]
            NAT[&quot;🔀 NAT Gateway&quot;]
            Bastion[&quot;🔒 Bastion Host&quot;]
        end
        
        %% Application Tier
        subgraph PrivateSubnets [&quot;🔒 Private Subnets&quot;]
            direction TB
            
            subgraph AppLayer [&quot;Application Layer&quot;]
                direction LR
                TG_FE[&quot;🎯 Target Group - FE&quot;]
                TG_BE[&quot;🎯 Target Group - BE&quot;]
                FE[&quot;🖥️ Front End (EC2/ECS)&quot;]
                BE[&quot;⚙️ Back End (EC2/ECS)&quot;]
            end
            
            subgraph DataLayer [&quot;Data Layer&quot;]
                direction LR
                RDS[&quot;💾 Aurora/RDS&quot;]
                ElastiCache[&quot;⚡ ElastiCache&quot;]
            end
        end
        
        %% VPC Flow
        WAF --&gt; LB
        LB -- &quot;Route: /api/*&quot; --&gt; TG_BE
        LB -- &quot;Route: /*&quot; --&gt; TG_FE
        TG_FE --&gt; FE
        TG_BE --&gt; BE
        
        %% Private Resources Communication
        FE -- &quot;API Calls&quot; --&gt; BE
        BE -- &quot;CRUD Operations&quot; --&gt; RDS
        BE -- &quot;Cache Operations&quot; --&gt; ElastiCache
        FE -- &quot;Cache Reads&quot; --&gt; ElastiCache
        
        %% Outbound Internet Access
        FE &amp; BE -.-&gt; NAT
        NAT -.-&gt; Internet([&quot;🌎 Internet&quot;])
    end
    
    %% Supporting Services
    subgraph SupportingServices [&quot;Supporting Services&quot;]
        direction LR
        CW[&quot;📊 CloudWatch&quot;]
        S3[&quot;📦 S3 Buckets&quot;]
        SecretsManager[&quot;🔑 Secrets Manager&quot;]
    end
    
    %% Supporting Services Integration
    FE &amp; BE --&gt; CW
    FE &amp; BE --&gt; S3
    BE --&gt; SecretsManager
    SecretsManager -..-&gt; RDS

<script src="vendor/mermaid.min.js"
        onerror="document.getElementById('onote').textContent='⚠ Mermaid CDN unreachable (offline) — showing raw source below each diagram instead.'"></script>
<script>
  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', maxTextSize: 200000 });
  }
  // Live filter
  const q = document.getElementById('q');
  q.addEventListener('input', () => {
    const term = q.value.trim().toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.classList.toggle('hidden', term && !c.dataset.name.includes(term));
    });
    document.querySelectorAll('h2.domain').forEach(h => {
      let n = h.nextElementSibling;
      const any = n && [...n.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
      h.classList.toggle('hidden', !any);
      if (n) n.classList.toggle('hidden', !any);
    });
  });

  // ---- single-diagram full-page viewer (zoom/pan overlay) ----
  (function(){
    const viewer = document.createElement('div');
    viewer.id = 'viewer';
    viewer.innerHTML =
      '<div class="vbar">'
      + '<span class="vtitle"></span>'
      + '<button data-a="out" title="Zoom out">\u2212</button>'
      + '<button data-a="in" title="Zoom in">+</button>'
      + '<button data-a="fit" title="Fit to screen (0)">Fit</button>'
      + '<button data-a="reset" title="Actual size">1:1</button>'
      + '<button data-a="close" title="Close (Esc)">\u2715 Close</button>'
      + '</div>'
      + '<div class="vstage"><div class="vwrap"></div>'
      + '<div class="vhint">scroll to zoom \u00b7 drag to pan \u00b7 Esc to close</div></div>';
    document.body.appendChild(viewer);
    const stage = viewer.querySelector('.vstage');
    const wrap  = viewer.querySelector('.vwrap');
    const vtitle= viewer.querySelector('.vtitle');
    let scale=1, tx=0, ty=0, baseFit=1;
    const apply = () => { wrap.style.transform =
      'translate('+tx+'px,'+ty+'px) scale('+scale+')'; };
    function fit(){
      const cw = wrap.offsetWidth, ch = wrap.offsetHeight;
      if(!cw || !ch) return;
      const sw = stage.clientWidth, sh = stage.clientHeight;
      baseFit = Math.min(sw/cw, sh/ch) * 0.94;
      scale = baseFit; tx = (sw-cw*scale)/2; ty = (sh-ch*scale)/2; apply();
    }
    function zoomAt(cx,cy,k){
      const ns = Math.min(Math.max(scale*k, baseFit*0.15), 16);
      tx = cx-(cx-tx)*(ns/scale); ty = cy-(cy-ty)*(ns/scale); scale = ns; apply();
    }
    function open(card){
      const src = card.querySelector('.diagram svg') || card.querySelector('.diagram pre');
      if(!src) return;
      wrap.innerHTML=''; wrap.style.width=''; wrap.style.height='';
      const node = src.cloneNode(true);
      if(node.tagName && node.tagName.toLowerCase()==='svg'){
        const vb = node.viewBox && node.viewBox.baseVal;
        const r = src.getBoundingClientRect();
        const w = (vb && vb.width) || r.width || 900;
        const h = (vb && vb.height) || r.height || 600;
        node.removeAttribute('style');
        node.setAttribute('width', w); node.setAttribute('height', h);
        wrap.style.width = w+'px'; wrap.style.height = h+'px';
      }
      wrap.appendChild(node);
      const t = card.querySelector('.dtitle');
      vtitle.textContent = t ? t.textContent : 'Diagram';
      viewer.classList.add('open');
      document.body.style.overflow='hidden';
      requestAnimationFrame(fit);
    }
    function close(){
      viewer.classList.remove('open'); wrap.innerHTML='';
      document.body.style.overflow='';
    }
    viewer.querySelector('.vbar').addEventListener('click', e=>{
      const b = e.target.closest('button'); if(!b) return;
      const a = b.dataset.a;
      if(a==='close') return close();
      if(a==='fit') return fit();
      if(a==='reset'){ scale=1; tx=(stage.clientWidth-wrap.offsetWidth)/2; ty=24; return apply(); }
      zoomAt(stage.clientWidth/2, stage.clientHeight/2, a==='in'?1.25:0.8);
    });
    stage.addEventListener('wheel', e=>{
      e.preventDefault(); const r=stage.getBoundingClientRect();
      zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:0.89);
    }, {passive:false});
    let drag=false, px=0, py=0;
    stage.addEventListener('pointerdown', e=>{ drag=true; px=e.clientX; py=e.clientY;
      stage.classList.add('grab'); stage.setPointerCapture(e.pointerId); });
    stage.addEventListener('pointermove', e=>{ if(!drag) return;
      tx+=e.clientX-px; ty+=e.clientY-py; px=e.clientX; py=e.clientY; apply(); });
    const endDrag = ()=>{ drag=false; stage.classList.remove('grab'); };
    stage.addEventListener('pointerup', endDrag);
    stage.addEventListener('pointercancel', endDrag);
    document.addEventListener('keydown', e=>{
      if(!viewer.classList.contains('open')) return;
      if(e.key==='Escape') close();
      else if(e.key==='+'||e.key==='=') zoomAt(stage.clientWidth/2, stage.clientHeight/2, 1.25);
      else if(e.key==='-') zoomAt(stage.clientWidth/2, stage.clientHeight/2, 0.8);
      else if(e.key==='0') fit();
    });
    window.addEventListener('resize', ()=>{ if(viewer.classList.contains('open')) fit(); });
    document.querySelectorAll('.card').forEach(card=>{
      const cap = card.querySelector('figcaption'); if(!cap) return;
      const b = document.createElement('button');
      b.className='openfull'; b.type='button'; b.textContent='\u2922 Full page';
      b.addEventListener('click', ()=>open(card));
      cap.appendChild(b);
    });
  })();
</script>
</body>
